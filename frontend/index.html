<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindConnect | Login</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(to bottom right, #e0f7fa, #f1f8e9);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 350px;
      animation: fadeIn 1s ease;
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    h2 {
      color: #388e3c;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    input {
      width: 85%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #a5d6a7;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #66bb6a;
      box-shadow: 0 0 5px #a5d6a7;
    }

    button {
      width: 90%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background-color: #81c784;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    button:hover {
      background-color: #66bb6a;
    }

    .error {
      color: #d32f2f;
      margin-top: 10px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🧠</div>
    <h2>Welcome to MindConnect</h2>
    <input type="text" id="username" placeholder="Enter Username" />
    <input type="password" id="password" placeholder="Enter Password" />
    <button id="loginBtn">Login</button>
    <p class="error" id="errorMsg"></p>
  </div>

  <script>
    document.getElementById("loginBtn").addEventListener("click", validateLogin);

    async function validateLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      const response = await fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const result = await response.json();

      if (result.success) {
        errorMsg.style.color = "#388e3c";
        errorMsg.innerText = "Login successful! Redirecting...";
        setTimeout(() => {
          window.location.href = "home.html";
        }, 1000);
      } else {
        errorMsg.style.color = "red";
        errorMsg.innerText = "Invalid username or password";
      }
    }
  </script>
</body>
</html>
